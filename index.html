<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Policy Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="main.js"></script>
  </head>
  <body class="page page-home">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <header class="hero">
      <div class="hero-text">
        <div class="brand">
          <img class="brand-logo" src="image/lohum_logo.svg" alt="Lohum logo" />
          <h1>Policy Dashboard</h1>
        </div>
        <p class="subtitle">
          Track application status across active government schemes
        </p>
      </div>
      <div class="hero-right">
        <div class="header-controls">
          <button
            type="button"
            id="font-size-decrease"
            class="font-btn-compact"
            aria-label="Decrease font size"
          >
            A-
          </button>
          <button
            type="button"
            id="font-size-increase"
            class="font-btn-compact"
            aria-label="Increase font size"
          >
            A+
          </button>
          <div class="meta-chip">
            <span class="meta-label">Last updated</span>
            <span id="last-updated" class="meta-value">--</span>
            <a
              href="https://github.com/Lohum-Special-Projects/policy_dashboard/actions/workflows/update.yml"
              target="_blank"
              class="refresh-btn"
              aria-label="Refresh data"
              title="Manually trigger update"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"
                />
              </svg>
            </a>
          </div>
        </div>
        <div class="metrics-inline">
          <div class="metric-card">
            <div id="scheme-count" class="metric-number">--</div>
            <div class="metric-text">Applicable Schemes</div>
          </div>
          <div class="metric-card">
            <div id="total-incentive" class="metric-number">--</div>
            <div class="metric-text">Crore (Rs)<br />Incentive Pool</div>
          </div>
        </div>
      </div>
    </header>

    <main class="content">
      <section class="table-card">
        <div class="table-header">
          <div>Scheme</div>
          <div class="header-icon-col"></div>
          <div>
            Government Budget<br /><span class="header-unit">(INR crores)</span>
          </div>
          <div>
            Lohum Incentive Size<br /><span class="header-unit"
              >(INR crores)</span
            >
          </div>
          <div>Next Deadline</div>
          <div>Status</div>
        </div>
        <div id="scheme-list" class="table-body">
          <div class="table-row loading">Loading data...</div>
        </div>
      </section>
    </main>
  </body>
</html>
